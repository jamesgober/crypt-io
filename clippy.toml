# clippy configuration for crypt-io
avoid-breaking-exported-api = true
msrv = "1.85"
doc-valid-idents = ["RustCrypto", "BLAKE3", "ChaCha20", "ChaCha20-Poly1305", "Poly1305", "AES-256-GCM", "AES-NI", "SHA-NI", "SHA-256", "SHA-512", "HMAC-SHA256", "HMAC-SHA512", "RFC8439", "TrustZone", "BCryptGenRandom", ".."]
cognitive-complexity-threshold = 30
type-complexity-threshold = 250
too-many-arguments-threshold = 7
trivial-copy-size-limit = 128
single-char-binding-names-threshold = 5